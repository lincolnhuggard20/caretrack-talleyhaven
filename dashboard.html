<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CareTrack — Ward Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg:     #0B0D0F;
  --card:   #13161A;
  --border: #1E2328;
  --text:   #E8EAED;
  --muted:  #5A6370;
  --danger: #E05252;
  --warn:   #D4A24A;
  --ok:     #52B788;
  --radius: 14px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── PIN GATE ── */
#pin-gate {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  gap: 28px;
}
.pin-logo {
  font-size: 13px;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.18em;
  color: var(--muted);
  text-transform: uppercase;
}
.pin-title { font-size: 32px; font-weight: 600; letter-spacing: -0.03em; }
.pin-sub { font-size: 14px; color: var(--muted); }
.pin-display { display: flex; gap: 14px; }
.pin-dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--muted); transition: all 0.2s; }
.pin-dot.filled { background: #48B5D8; border-color: #48B5D8; transform: scale(1.2); }
.pin-pad { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; width: 240px; }
.pin-key {
  aspect-ratio: 1; border: 1px solid var(--border); background: var(--card);
  color: var(--text); font-family: 'DM Mono', monospace; font-size: 20px;
  font-weight: 500; border-radius: 12px; cursor: pointer; transition: all 0.12s;
}
.pin-key:hover { background: #1E2328; }
.pin-key:active { background: #1A6985; transform: scale(0.96); }
.pin-key.clear { font-size: 13px; color: var(--muted); }
.pin-key.del   { font-size: 16px; color: var(--warn); }
.pin-error { color: var(--danger); font-size: 13px; font-family: 'DM Mono', monospace; min-height: 18px; }

/* ── APP SHELL ── */
#app { display: none; }
#app.visible { display: block; }

.topbar {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
  position: sticky; top: 0; z-index: 50;
}
.topbar-brand {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  letter-spacing: 0.12em;
  color: #48B5D8;
  text-transform: uppercase;
}
.topbar-right {
  display: flex; align-items: center; gap: 16px;
}
.topbar-date {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--muted);
}
.refresh-btn {
  background: none; border: 1px solid var(--border);
  color: var(--muted); font-family: 'DM Mono', monospace;
  font-size: 11px; padding: 6px 12px; border-radius: 8px; cursor: pointer;
  transition: all 0.15s; letter-spacing: 0.05em;
}
.refresh-btn:hover { color: var(--text); border-color: #48B5D8; }

/* ── WARD TABS ── */
.ward-tabs {
  display: flex;
  gap: 8px;
  padding: 16px 24px;
  overflow-x: auto;
  scrollbar-width: none;
  border-bottom: 1px solid var(--border);
  background: var(--card);
}
.ward-tabs::-webkit-scrollbar { display: none; }

.ward-tab {
  padding: 8px 18px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: var(--bg);
  color: var(--muted);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.18s;
  display: flex; align-items: center; gap: 8px;
}
.ward-tab .count-badge {
  background: rgba(255,255,255,0.06);
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  padding: 2px 7px;
  border-radius: 20px;
}
.ward-tab.active {
  color: var(--text);
  background: var(--card);
}
.ward-tab.active .count-badge {
  color: white;
}

/* Ward-specific active colours */
.ward-tab[data-ward="Acacia"].active    { border-color: #52B788; }
.ward-tab[data-ward="Jacaranda"].active { border-color: #9B72CF; }
.ward-tab[data-ward="Melaleuca"].active { border-color: #48B5D8; }
.ward-tab[data-ward="Grevillea"].active { border-color: #E07A54; }
.ward-tab[data-ward="Banksia"].active   { border-color: #C9A84C; }

/* ── SUMMARY STATS ── */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
}
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
}
.stat-val {
  font-size: 28px;
  font-weight: 600;
  font-family: 'DM Mono', monospace;
  letter-spacing: -0.02em;
  line-height: 1;
}
.stat-label {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-top: 6px;
  font-family: 'DM Mono', monospace;
}
.stat-ok   .stat-val { color: var(--ok); }
.stat-warn .stat-val { color: var(--warn); }
.stat-danger .stat-val { color: var(--danger); }
.stat-info .stat-val { color: #48B5D8; }

/* ── RESIDENT TABLE ── */
.table-wrap {
  padding: 16px 24px;
  overflow-x: auto;
}
.table-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 14px;
}
.table-title {
  font-size: 15px; font-weight: 600; letter-spacing: -0.01em;
}
.export-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 500;
  padding: 8px 16px; border-radius: 10px;
  cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; gap: 6px;
}
.export-btn:hover { background: var(--card); border-color: #48B5D8; color: #48B5D8; }

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  min-width: 700px;
}
thead th {
  padding: 10px 14px;
  text-align: left;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  font-weight: 500;
}
tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background 0.12s;
}
tbody tr:hover { background: var(--card); }
tbody tr.no-entry { opacity: 0.5; }
tbody td {
  padding: 12px 14px;
  vertical-align: top;
}
.resident-cell-name { font-weight: 500; font-size: 14px; }
.resident-cell-room { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 2px; }

.status-pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 20px;
  font-family: 'DM Mono', monospace;
  font-size: 11px; font-weight: 500;
}
.pill-ok    { background: rgba(82,183,136,0.12); color: var(--ok); }
.pill-warn  { background: rgba(212,162,74,0.12);  color: var(--warn); }
.pill-no    { background: rgba(90,99,112,0.1);    color: var(--muted); }
.pill-alert { background: rgba(224,82,82,0.12);   color: var(--danger); }

.meal-mini {
  display: flex; gap: 6px; flex-wrap: wrap;
}
.meal-chip {
  padding: 3px 8px; border-radius: 6px; font-size: 11px;
  font-family: 'DM Mono', monospace;
  background: rgba(255,255,255,0.05);
  color: var(--muted);
}
.meal-chip.high { color: var(--ok); background: rgba(82,183,136,0.1); }
.meal-chip.low  { color: var(--danger); background: rgba(224,82,82,0.1); }
.meal-chip.mid  { color: var(--warn); background: rgba(212,162,74,0.1); }

.behav-list { display: flex; flex-wrap: wrap; gap: 4px; }
.behav-tag {
  font-size: 10px; padding: 3px 8px; border-radius: 6px;
  background: rgba(224,82,82,0.1); color: var(--danger);
  font-family: 'DM Mono', monospace;
}

.time-stamp {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
}
.no-entry-msg { font-size: 12px; color: var(--muted); }

/* ── WEEK VIEW PANEL ── */
.week-panel-toggle {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 24px;
  border-top: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
}
.week-panel-toggle:hover { background: rgba(255,255,255,0.02); }
.week-panel-label {
  font-size: 14px; font-weight: 500;
  display: flex; align-items: center; gap: 10px;
}
.week-panel-chevron { color: var(--muted); transition: transform 0.2s; font-size: 16px; }
.week-panel-chevron.open { transform: rotate(180deg); }

.week-panel { display: none; padding: 0 24px 24px; }
.week-panel.open { display: block; }

.week-selector {
  display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
}
.week-btn {
  padding: 6px 14px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--card);
  color: var(--muted); font-family: 'DM Mono', monospace;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.week-btn.active { border-color: #48B5D8; color: #48B5D8; }
.week-btn:hover  { color: var(--text); }

.week-resident-block {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); margin-bottom: 12px; overflow: hidden;
}
.week-res-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
.week-res-name { font-weight: 500; font-size: 14px; }
.week-res-room { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }

.week-days-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 1px;
  background: var(--border);
}
.week-day-cell {
  background: var(--card);
  padding: 10px 8px;
  min-height: 70px;
}
.week-day-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 6px;
}
.week-day-dots { display: flex; flex-direction: column; gap: 3px; }
.week-dot {
  width: 8px; height: 8px; border-radius: 50%;
  display: inline-block;
}
.dot-bowel  { background: var(--ok); }
.dot-meal   { background: var(--warn); }
.dot-behav  { background: var(--danger); }
.dot-none   { background: var(--border); }
.week-dot-count { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; }

/* loading */
.loading-msg {
  text-align: center; padding: 60px 24px;
  color: var(--muted); font-family: 'DM Mono', monospace;
  font-size: 13px; letter-spacing: 0.06em;
}

@media (max-width: 768px) {
  .stats-bar { grid-template-columns: repeat(2, 1fr); }
  .topbar { padding: 0 16px; }
  .ward-tabs { padding: 12px 16px; }
  .table-wrap { padding: 12px 16px; }
  .week-panel { padding: 0 16px 20px; }
  .week-days-grid { grid-template-columns: repeat(7, minmax(0, 1fr)); }
  .week-day-cell { padding: 6px 4px; }
}
</style>
</head>
<body>

<!-- PIN GATE -->
<div id="pin-gate">
  <div class="pin-logo">CareTrack · Talleyhaven</div>
  <div>
    <div class="pin-title" style="text-align:center">Dashboard Access</div>
    <div class="pin-sub" style="text-align:center;margin-top:6px">Nurses &amp; Senior Staff</div>
  </div>
  <div class="pin-display">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-pad">
    <button class="pin-key" onclick="pinPress('1')">1</button>
    <button class="pin-key" onclick="pinPress('2')">2</button>
    <button class="pin-key" onclick="pinPress('3')">3</button>
    <button class="pin-key" onclick="pinPress('4')">4</button>
    <button class="pin-key" onclick="pinPress('5')">5</button>
    <button class="pin-key" onclick="pinPress('6')">6</button>
    <button class="pin-key" onclick="pinPress('7')">7</button>
    <button class="pin-key" onclick="pinPress('8')">8</button>
    <button class="pin-key" onclick="pinPress('9')">9</button>
    <button class="pin-key clear" onclick="pinClear()">CLR</button>
    <button class="pin-key" onclick="pinPress('0')">0</button>
    <button class="pin-key del" onclick="pinDel()">⌫</button>
  </div>
  <div class="pin-error" id="pin-error"></div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-brand">⬡ CareTrack Dashboard</div>
    <div class="topbar-right">
      <span class="topbar-date" id="topbar-date"></span>
      <button class="refresh-btn" onclick="loadWardData()">↻ Refresh</button>
    </div>
  </div>

  <!-- Ward Tabs -->
  <div class="ward-tabs" id="ward-tabs"></div>

  <!-- Stats -->
  <div class="stats-bar" id="stats-bar">
    <div class="stat-card stat-info">
      <div class="stat-val" id="stat-entries">—</div>
      <div class="stat-label">Entries Today</div>
    </div>
    <div class="stat-card stat-ok">
      <div class="stat-val" id="stat-bowels">—</div>
      <div class="stat-label">Bowel Actions</div>
    </div>
    <div class="stat-card stat-warn">
      <div class="stat-val" id="stat-lowmeal">—</div>
      <div class="stat-label">Low Intake (&lt;50%)</div>
    </div>
    <div class="stat-card stat-danger">
      <div class="stat-val" id="stat-behaviours">—</div>
      <div class="stat-label">Behaviour Alerts</div>
    </div>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <div class="table-header">
      <div class="table-title" id="table-title">Today's Observations</div>
      <button class="export-btn" onclick="exportToClipboard()">📋 Copy for Clinical System</button>
    </div>
    <div id="table-container"><div class="loading-msg">Loading ward data…</div></div>
  </div>

  <!-- Week History Panel -->
  <div class="week-panel-toggle" onclick="toggleWeekPanel()">
    <div class="week-panel-label">
      <span>📅</span>
      <span>Historical View — Weekly Storage</span>
    </div>
    <span class="week-panel-chevron" id="week-chevron">▼</span>
  </div>
  <div class="week-panel" id="week-panel">
    <div class="week-selector" id="week-selector"></div>
    <div id="week-content"><div class="loading-msg">Select a week above to view stored data.</div></div>
  </div>
</div>

<!-- ════════════════════════════════════════════ -->
<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBb1uxLSxhW_izFpB_sqZ9k6Qy3gTTQ-dw",
  authDomain: "caretrack-talleyhaven.firebaseapp.com",
  databaseURL: "https://caretrack-talleyhaven-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "caretrack-talleyhaven",
  storageBucket: "caretrack-talleyhaven.firebasestorage.app",
  messagingSenderId: "769665058120",
  appId: "1:769665058120:web:8e2035a7f2da4b213e1f7d"
};

const STAFF_PIN = "1234";

const WARDS = ["Acacia","Jacaranda","Melaleuca","Grevillea","Banksia"];
const WARD_COLORS = {
  Acacia:    "#52B788", Jacaranda: "#9B72CF",
  Melaleuca: "#48B5D8", Grevillea: "#E07A54", Banksia: "#C9A84C"
};

firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.database();

let activeWard     = "Acacia";
let wardDataCache  = {};
let allResidents   = {};
let weekPanelOpen  = false;
let selectedWeek   = null;

// ── PIN ──
let pinVal = "";
function pinPress(n) { if (pinVal.length>=4) return; pinVal+=n; updatePinDots(); if (pinVal.length===4) setTimeout(checkPin,200); }
function pinDel() { pinVal=pinVal.slice(0,-1); updatePinDots(); }
function pinClear() { pinVal=""; updatePinDots(); document.getElementById("pin-error").textContent=""; }
function updatePinDots() {
  [0,1,2,3].forEach(i=>document.getElementById("d"+i).classList.toggle("filled",i<pinVal.length));
}
function checkPin() {
  if (pinVal===STAFF_PIN) {
    document.getElementById("pin-gate").style.display="none";
    document.getElementById("app").classList.add("visible");
    initApp();
  } else {
    document.getElementById("pin-error").textContent="Incorrect PIN";
    pinVal=""; updatePinDots();
    setTimeout(()=>document.getElementById("pin-error").textContent="",2000);
  }
}

// ── INIT ──
function initApp() {
  document.getElementById("topbar-date").textContent = new Date().toLocaleDateString("en-AU",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  buildWardTabs();
  loadWardData();
}

function getWeekKey(d=new Date()) {
  const day=new Date(d); day.setDate(day.getDate()-day.getDay()+1);
  return "week_"+day.toISOString().split("T")[0];
}
function getDayKey(d=new Date()) { return d.toISOString().split("T")[0]; }
function getAEST() { 
  const formatter = new Intl.DateTimeFormat("en-AU", { 
    timeZone: "Australia/Brisbane",
    year: "numeric", month: "2-digit", day: "2-digit",
    hour: "2-digit", minute: "2-digit", second: "2-digit",
    hour12: false 
  });
  const [datePart, timePart] = formatter.formatToParts(new Date())
    .reduce((acc, part) => {
      if (part.type === 'literal' && part.value === ' ') return [acc[0].join(''), acc[1]];
      if (!acc[0].length && ['year','month','day'].includes(part.type)) acc[0].push(part.value);
      else if (acc[0].length && ['hour','minute','second'].includes(part.type)) acc[1].push(part.value);
      return acc;
    }, [[], []]);
  const [y, m, d] = Object.fromEntries(formatter.formatToParts(new Date()).map(p => [p.type, p.value])).split?.(',') || [];
  const parts = formatter.formatToParts(new Date());
  const obj = {};
  parts.forEach(p => { if (p.type !== 'literal') obj[p.type] = p.value; });
  return new Date(`${obj.year}-${obj.month}-${obj.day}T${obj.hour}:${obj.minute}:${obj.second}`);
}

// ── WARD TABS ──
function buildWardTabs() {
  const wrap = document.getElementById("ward-tabs");
  wrap.innerHTML = "";
  WARDS.forEach(w => {
    const tab = document.createElement("button");
    tab.className = "ward-tab" + (w===activeWard?" active":"");
    tab.dataset.ward = w;
    tab.innerHTML = `<span>${w}</span><span class="count-badge" id="badge-${w}">—</span>`;
    tab.onclick = () => { activeWard=w; buildWardTabs(); renderCurrentWard(); };
    wrap.appendChild(tab);
  });
}

// ── LOAD ALL WARDS ──
async function loadWardData() {
  document.getElementById("table-container").innerHTML='<div class="loading-msg">Loading…</div>';
  const aest    = getAEST();
  const weekKey = getWeekKey(aest);
  const dayKey  = getDayKey(aest);
  const cutoff  = Date.now() - 24*60*60*1000;

  wardDataCache = {};
  allResidents  = {};

  const promises = WARDS.map(async ward => {
    const snap = await db.ref(`wards/${ward}`).once("value");
    const data  = snap.val() || {};
    wardDataCache[ward] = {};

if (data.residents) {
  Object.entries(data.residents).forEach(([resId, resData]) => {
    const res = { 
      id: resId, 
      name: "Room " + (resData.room || resId), // Use Room Number as the "Name"
      room: "",
      ward
    };
    const dayEntries = resData.entries?.[weekKey]?.[dayKey] || {};
        const recent = Object.values(dayEntries).filter(e => e.timestamp >= cutoff);
        recent.sort((a,b) => b.timestamp - a.timestamp);
        wardDataCache[ward][resId] = { ...res, entries: recent, latestEntry: recent[0] || null };
        allResidents[resId] = wardDataCache[ward][resId];
      });
    }

    // Update badge
    const count = Object.values(wardDataCache[ward]).filter(r=>r.latestEntry).length;
    const badge = document.getElementById("badge-"+ward);
    if (badge) badge.textContent = count;
  });

  await Promise.all(promises);
  renderCurrentWard();
  buildWeekSelector();
}

// ── RENDER TABLE ──
function renderCurrentWard() {
  const residents = Object.values(wardDataCache[activeWard] || {});
  const title = document.getElementById("table-title");
  title.textContent = `${activeWard} Ward — Today's Observations`;

  // Stats
  const totalEntries = residents.reduce((s,r) => s + (r.entries?.length||0), 0);
  const bowelCount   = residents.filter(r=>r.latestEntry?.bowels).length;
  const lowMeal      = residents.filter(r => {
    const e = r.latestEntry?.meals;
    if (!e) return false;
    const vals = Object.values(e).filter(Boolean);
    return vals.some(v => ["0%","25%"].includes(v));
  }).length;
  const behavCount = residents.filter(r=>(r.latestEntry?.behaviours||[]).length>0).length;

  document.getElementById("stat-entries").textContent    = totalEntries;
  document.getElementById("stat-bowels").textContent     = bowelCount;
  document.getElementById("stat-lowmeal").textContent    = lowMeal;
  document.getElementById("stat-behaviours").textContent = behavCount;

  if (!residents.length) {
    document.getElementById("table-container").innerHTML = `
      <div class="loading-msg">No residents configured for ${activeWard}.<br>
      <span style="font-size:11px;color:#3a4248;margin-top:8px;display:block">
      Add residents via Firebase console: wards/${activeWard}/residents/{id}/name</span></div>`;
    return;
  }

  residents.sort((a,b) => {
    const ar = parseInt(a.room)||0, br = parseInt(b.room)||0;
    return ar - br;
  });

  const rows = residents.map(r => {
    const e = r.latestEntry;
    if (!e) {
      return `<tr class="no-entry">
        <td><div class="resident-cell-name">${r.name}</div><div class="resident-cell-room">${r.room?'Rm '+r.room:''}</div></td>
        <td><span class="status-pill pill-no">No entry</span></td>
        <td class="no-entry-msg">—</td><td>—</td><td>—</td><td>—</td>
      </tr>`;
    }

    // Bowels
    const bowelPill = e.bowels
      ? `<span class="status-pill pill-ok">✓ ${e.bristolType?"T"+e.bristolType:""}</span>`
      : `<span class="status-pill pill-no">None</span>`;

    // Meals
    const mealHtml = e.meals ? `<div class="meal-mini">${
      ["breakfast","lunch","dinner"].map(m => {
        const v = e.meals[m]; if (!v) return '';
        const cls = ["0%","25%"].includes(v)?"low":v==="100%"||v==="75%"?"high":"mid";
        return `<span class="meal-chip ${cls}">${m[0].toUpperCase()} ${v}</span>`;
      }).join("")
    }</div>` : "—";

    // Fluid
    const fluid = e.fluidMl ? `<span style="font-family:'DM Mono',monospace;font-size:12px;color:${e.fluidMl<500?"var(--danger)":"var(--ok)"}">${e.fluidMl}mL</span>` : "—";

    // Behaviours
    const behavHtml = (e.behaviours||[]).length
      ? `<div class="behav-list">${e.behaviours.map(b=>`<span class="behav-tag">${b}</span>`).join("")}</div>`
      : `<span style="font-size:12px;color:var(--muted)">None noted</span>`;

    const timeStr = `<span class="time-stamp">${new Date(e.timestamp).toLocaleTimeString("en-AU",{timeZone:"Australia/Brisbane",hour:"2-digit",minute:"2-digit"})}</span>`;

    return `<tr>
      <td><div class="resident-cell-name">${r.name}</div><div class="resident-cell-room">${r.room?'Rm '+r.room:''}</div></td>
      <td>${timeStr}</td>
      <td>${bowelPill}</td>
      <td>${mealHtml}</td>
      <td>${fluid}</td>
      <td>${behavHtml}</td>
    </tr>`;
  }).join("");

  document.getElementById("table-container").innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Resident</th>
          <th>Last Entry</th>
          <th>Bowels</th>
          <th>Meals (B/L/D)</th>
          <th>Fluid</th>
          <th>Behaviours</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ── EXPORT TO CLIPBOARD ──
function exportToClipboard() {
  const residents = Object.values(wardDataCache[activeWard] || {});
  const today = new Date().toLocaleDateString("en-AU",{weekday:"long",day:"numeric",month:"long",year:"numeric"});

  let text = `CARETRACK EXPORT — ${activeWard.toUpperCase()} WARD\n${today}\n`;
  text += "─".repeat(50) + "\n\n";

  residents.sort((a,b)=>(parseInt(a.room)||0)-(parseInt(b.room)||0));

  residents.forEach(r => {
    const e = r.latestEntry;
    text += `▸ ${r.name}${r.room?" (Rm "+r.room+")":""}\n`;
    if (!e) { text += "  No entry recorded in last 24 hours.\n\n"; return; }
    const t = new Date(e.timestamp).toLocaleTimeString("en-AU",{timeZone:"Australia/Brisbane",hour:"2-digit",minute:"2-digit"});
    text += `  Recorded: ${t}\n`;
    if (e.bowels) text += `  Bowels: Yes${e.bristolType?" — Bristol Type "+e.bristolType+" ("+bristolDesc(e.bristolType)+")":""}\n`;
    else text += `  Bowels: Not recorded\n`;
    if (e.meals) {
      const m=e.meals;
      text += `  Meals: Breakfast ${m.breakfast||"—"} / Lunch ${m.lunch||"—"} / Dinner ${m.dinner||"—"}\n`;
    }
    if (e.fluidMl) text += `  Fluids: ${e.fluidMl}mL\n`;
    if ((e.behaviours||[]).length) text += `  Behaviours: ${e.behaviours.join(", ")}\n`;
    if (e.notes) text += `  Notes: ${e.notes}\n`;
    text += "\n";
  });

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector(".export-btn");
    btn.textContent = "✓ Copied!";
    setTimeout(()=>btn.innerHTML='📋 Copy for Clinical System',2000);
  });
}

function bristolDesc(t) {
  const d=["","Hard lumps","Lumpy sausage","Cracks on surface","Smooth sausage","Soft blobs","Fluffy/ragged","Liquid"];
  return d[t]||"";
}

// ── WEEK PANEL ──
function toggleWeekPanel() {
  weekPanelOpen = !weekPanelOpen;
  document.getElementById("week-panel").classList.toggle("open", weekPanelOpen);
  document.getElementById("week-chevron").classList.toggle("open", weekPanelOpen);
  if (weekPanelOpen && !selectedWeek) buildWeekSelector();
}

function buildWeekSelector() {
  const wrap = document.getElementById("week-selector");
  wrap.innerHTML = "";
  const today = getAEST();

  for (let i = 0; i < 8; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() - i * 7);
    const wk  = getWeekKey(d);
    const mon = new Date(d); mon.setDate(mon.getDate()-mon.getDay()+1);
    const sun = new Date(mon); sun.setDate(sun.getDate()+6);
    const label = `${mon.getDate()}/${mon.getMonth()+1} – ${sun.getDate()}/${sun.getMonth()+1}`;

    const btn = document.createElement("button");
    btn.className = "week-btn" + (i===0?" active":"");
    btn.textContent = i===0 ? `This week (${label})` : label;
    btn.onclick = () => {
      document.querySelectorAll(".week-btn").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      selectedWeek = wk;
      loadWeekData(wk);
    };
    wrap.appendChild(btn);
    if (i===0) { selectedWeek=wk; }
  }
  loadWeekData(selectedWeek);
}

async function loadWeekData(weekKey) {
  document.getElementById("week-content").innerHTML='<div class="loading-msg">Loading week…</div>';
  const snap = await db.ref(`wards/${activeWard}`).once("value");
  const data  = snap.val() || {};
  if (!data.residents) {
    document.getElementById("week-content").innerHTML='<div class="loading-msg">No resident data found.</div>';
    return;
  }

  // Build week days Mon–Sun
  const monDate = new Date(weekKey.replace("week_",""));
  const days = Array.from({length:7},(_,i)=>{
    const d=new Date(monDate); d.setDate(d.getDate()+i);
    return { key: d.toISOString().split("T")[0], label: d.toLocaleDateString("en-AU",{weekday:"short",day:"numeric"}) };
  });

  const html = Object.entries(data.residents).map(([resId, resData]) => {
    const name = resData.name || resId;
    const room = resData.room || "";
    const weekData = resData.entries?.[weekKey] || {};

    const dayCells = days.map(day => {
      const entries = Object.values(weekData[day.key]||{});
      if (!entries.length) {
        return `<div class="week-day-cell">
          <div class="week-day-label">${day.label}</div>
          <span class="week-dot dot-none" style="width:100%;height:3px;border-radius:2px;display:block"></span>
        </div>`;
      }
      const latest = entries.sort((a,b)=>b.timestamp-a.timestamp)[0];
      const hasBowel = latest.bowels;
      const hasLowMeal = Object.values(latest.meals||{}).some(v=>["0%","25%"].includes(v));
      const hasBehav = (latest.behaviours||[]).length>0;

      return `<div class="week-day-cell">
        <div class="week-day-label">${day.label}</div>
        <div class="week-day-dots">
          ${hasBowel?'<span class="week-dot dot-bowel" title="Bowels recorded"></span>':""}
          ${hasLowMeal?'<span class="week-dot dot-meal" title="Low intake"></span>':""}
          ${hasBehav?'<span class="week-dot dot-behav" title="Behaviour noted"></span>':""}
          <span class="week-dot-count">${entries.length} entr${entries.length===1?"y":"ies"}</span>
        </div>
      </div>`;
    }).join("");

    return `<div class="week-resident-block">
      <div class="week-res-header">
        <div class="week-res-name">${name}</div>
        <div class="week-res-room">${room?"Rm "+room:""}</div>
      </div>
      <div class="week-days-grid">${dayCells}</div>
    </div>`;
  }).join("");

  const legend = `<div style="display:flex;gap:16px;margin-bottom:14px;font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;flex-wrap:wrap">
    <span><span class="week-dot dot-bowel" style="display:inline-block;vertical-align:middle;margin-right:5px"></span>Bowels</span>
    <span><span class="week-dot dot-meal"  style="display:inline-block;vertical-align:middle;margin-right:5px"></span>Low intake</span>
    <span><span class="week-dot dot-behav" style="display:inline-block;vertical-align:middle;margin-right:5px"></span>Behaviour</span>
  </div>`;

  document.getElementById("week-content").innerHTML = legend + (html || '<div class="loading-msg">No data for this week.</div>');
}
</script>
